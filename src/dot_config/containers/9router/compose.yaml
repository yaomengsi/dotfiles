name: 9router

services:
  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    ports:
      - "0.0.0.0:20128:20128"
    environment:
      DATA_DIR: /app/data
      # INITIAL_PASSWORD: change-on-first-login   # default 123456; change via dashboard
      # JWT_SECRET: ${JWT_SECRET:-}
      # REQUIRE_API_KEY: "false"
    volumes:
      - data:/app/data
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:20128/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.9router
